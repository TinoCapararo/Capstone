version: '4.20'

services:
  db:
    image: 'mariadb:11.0'
    restart: always
    expose:
      - 3306
    ports:
      - 3306:3306
    environment:
      - MARIADB_ROOT_PASSWORD=password
      - MARIADB_DATABASE=capstone_development

  db-manager:
    image: 'phpmyadmin:5.2'
    depends_on:
      - db
    restart: always
    expose:
      - 80
    ports:
      - 8080:80
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=password
      - UPLOAD_LIMIT=2560M
